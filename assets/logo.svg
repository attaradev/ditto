<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
  <defs>
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cylGradCopy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect width="520" height="130" rx="14" fill="url(#bg)"/>

  <!-- ── Source database cylinder ── -->
  <!-- Top cap -->
  <ellipse cx="65" cy="28" rx="30" ry="10" fill="#3B82F6"/>
  <!-- Body -->
  <rect x="35" y="28" width="60" height="72" fill="url(#cylGrad)"/>
  <!-- Horizontal ring lines -->
  <ellipse cx="65" cy="52" rx="30" ry="10" fill="none" stroke="#93C5FD" stroke-width="1.2" opacity="0.35"/>
  <ellipse cx="65" cy="72" rx="30" ry="10" fill="none" stroke="#93C5FD" stroke-width="1.2" opacity="0.35"/>
  <!-- Bottom cap -->
  <ellipse cx="65" cy="100" rx="30" ry="10" fill="#1E40AF"/>

  <!-- ── Arrow ── -->
  <line x1="106" y1="64" x2="138" y2="64" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="133,57.5 141,64 133,70.5" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Copy database cylinder (offset + lighter, suggesting ephemeral) ── -->
  <!-- Top cap -->
  <ellipse cx="181" cy="28" rx="30" ry="10" fill="#60A5FA" opacity="0.85"/>
  <!-- Body -->
  <rect x="151" y="28" width="60" height="72" fill="url(#cylGradCopy)" opacity="0.75"/>
  <!-- Horizontal ring lines -->
  <ellipse cx="181" cy="52" rx="30" ry="10" fill="none" stroke="#BAE6FD" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="181" cy="72" rx="30" ry="10" fill="none" stroke="#BAE6FD" stroke-width="1.2" opacity="0.4"/>
  <!-- Bottom cap -->
  <ellipse cx="181" cy="100" rx="30" ry="10" fill="#2563EB" opacity="0.75"/>
  <!-- Dashed border to signal it is a copy, not the real thing -->
  <rect x="151" y="28" width="60" height="72" fill="none" stroke="#93C5FD" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- ── Wordmark ── -->
  <text
    x="232" y="78"
    font-family="ui-monospace,'Cascadia Code','Source Code Pro',Menlo,Consolas,'DejaVu Sans Mono',monospace"
    font-size="54"
    font-weight="700"
    fill="white"
    letter-spacing="-2"
  >ditto</text>

  <!-- ── Tagline ── -->
  <text
    x="234" y="100"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="13"
    fill="#64748B"
    letter-spacing="0.3"
  >ephemeral database copies for CI</text>
</svg>
