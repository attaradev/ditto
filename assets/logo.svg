<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" width="440" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="28%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#1E3A6E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cylSrc" x1="0%" y1="0%" x2="8%" y2="100%">
      <stop offset="0%" stop-color="#4F90F8"/>
      <stop offset="100%" stop-color="#1A44C8"/>
    </linearGradient>
    <linearGradient id="cylCopy" x1="0%" y1="0%" x2="8%" y2="100%">
      <stop offset="0%" stop-color="#67B2FA"/>
      <stop offset="100%" stop-color="#2A5FE0"/>
    </linearGradient>
<filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="140" rx="14" fill="url(#bg)"/>
  <rect width="440" height="140" rx="14" fill="url(#bgGlow)"/>
  <rect width="440" height="140" rx="14" fill="none" stroke="#1E2D45" stroke-width="1"/>

  <!-- Glow halo behind source top cap -->
  <ellipse cx="68" cy="33" rx="30" ry="10" fill="#4F90F8" opacity="0.5" filter="url(#halo)"/>

  <!-- ── Source cylinder — vertical center y=70 ── -->
  <ellipse cx="68" cy="33" rx="30" ry="10" fill="#4F90F8"/>
  <rect x="38" y="33" width="60" height="74" fill="url(#cylSrc)"/>
  <ellipse cx="68" cy="55" rx="30" ry="10" fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.38"/>
  <ellipse cx="68" cy="78" rx="30" ry="10" fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.38"/>
  <ellipse cx="68" cy="107" rx="30" ry="10" fill="#1638A8"/>

  <!-- Arrow: bright shaft + solid filled head, centered at y=70 -->
  <line x1="102" y1="70" x2="151" y2="70" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round"/>
  <polygon points="151,63 161,70 151,77" fill="#22D3EE"/>

  <!-- ── Copy cylinder — same geometry, ghosted ── -->
  <ellipse cx="192" cy="33" rx="30" ry="10" fill="#67B2FA" opacity="0.65"/>
  <rect x="162" y="33" width="60" height="74" fill="url(#cylCopy)" opacity="0.5"/>
  <ellipse cx="192" cy="55" rx="30" ry="10" fill="none" stroke="#BAE6FD" stroke-width="1" opacity="0.38"/>
  <ellipse cx="192" cy="78" rx="30" ry="10" fill="none" stroke="#BAE6FD" stroke-width="1" opacity="0.38"/>
  <ellipse cx="192" cy="107" rx="30" ry="10" fill="#2A5FE0" opacity="0.5"/>
  <rect x="162" y="33" width="60" height="74" fill="none" stroke="#7EB8FB" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.6"/>

  <!-- Wordmark -->
  <text
    x="248" y="76"
    font-family="ui-monospace,'Cascadia Code','Source Code Pro',Menlo,Consolas,'DejaVu Sans Mono',monospace"
    font-size="54"
    font-weight="700"
    fill="white"
    letter-spacing="-2"
  >ditto</text>

  <!-- Tagline -->
  <text
    x="250" y="104"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="13"
    font-weight="400"
    fill="#4A6A94"
    letter-spacing="0.4"
  >real data. zero risk.</text>
</svg>
