name: 'ditto copy create'
description: 'Create an isolated database copy for a CI job on a self-hosted ditto runner'

inputs:
  ttl:
    description: 'How long to keep the copy before automatic cleanup (for example: 1h, 30m)'
    required: false
    default: '2h'
  server_url:
    description: 'Remote ditto server URL (e.g. http://ditto.internal:8080). If omitted, ditto runs locally.'
    required: false
    default: ''
  ditto_token:
    description: 'Bearer token for authenticating with a remote ditto server.'
    required: false
    default: ''

outputs:
  database_url:
    description: 'Connection string for the isolated database copy'
    value: ${{ steps.create.outputs.database_url }}
  copy_id:
    description: 'Copy ID for cleanup with attaradev/ditto/actions/delete'
    value: ${{ steps.create.outputs.copy_id }}

runs:
  using: composite
  steps:
    - id: create
      shell: bash
      env:
        DITTO_TOKEN: ${{ inputs.ditto_token }}
      run: |
        SERVER_FLAG=""
        if [ -n "${{ inputs.server_url }}" ]; then
          SERVER_FLAG="--server=${{ inputs.server_url }}"
        fi
        OUTPUT=$(ditto copy create --format=json --ttl "${{ inputs.ttl }}" $SERVER_FLAG)
        COPY_ID=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
        CONN=$(echo "$OUTPUT"    | python3 -c "import sys,json; print(json.load(sys.stdin)['connection_string'])")
        echo "::add-mask::${CONN}"
        echo "database_url=${CONN}" >> "$GITHUB_OUTPUT"
        echo "copy_id=${COPY_ID}"   >> "$GITHUB_OUTPUT"
        echo "DATABASE_URL=${CONN}" >> "$GITHUB_ENV"
