default: true

# Allow same heading content under different parent sections (e.g. ### Added in each changelog entry).
MD024:
  siblings_only: true

# Line length — 120 is more practical for technical docs with URLs and code refs.
MD013:
  line_length: 120
  code_blocks: false
  tables: false

# Allow raw HTML in the issue templates (front-matter style delimiters are fine).
MD033: false

# README starts with a centered <p> logo block rather than a bare # heading.
MD041: false
