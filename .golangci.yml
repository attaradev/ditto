version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gofmt
    - goimports
    - gosec
    - misspell

issues:
  exclude-rules:
    # G304: file path from variable — intentional in dump scheduler and config loading.
    - linters: [gosec]
      text: "G304"
    # Test files are exempt from errcheck (test helpers often ignore cleanup errors).
    - path: "_test\\.go"
      linters: [errcheck]
